name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          else
            npm ci || npm install
          fi

      - name: Lint
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm lint; else npm run lint; fi

      - name: Test
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm test; else npm test; fi

      - name: Build
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm build; else npm run build; fi